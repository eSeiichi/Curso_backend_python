<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App animal</title>
    <style>
        body{
            background-color: gray;
        }
    </style>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
</head>
<body>
    <script src="index.js" defer></script>
    <h1>AppAnimal - aplicativo para cadastro de animais</h1>

    <h2>Cadastrar animal</h2>
    <form action="post" id="form_animal">
        <input type="text" id="nome" placeholder="Digite o nome do animal"><br>
        <input type="submit" value="Salvar">
    </form>

    <h2>Animais cadastrados</h2>

    <ul id="lista_animais"></ul> <!-- deu-se um id para essa tag ul, para colocar li dentro dela pelo js-->

    <h2>Obter animal pelo id</h2>
    <form action="post" id="obter_animal">
        <input type="text" id="id_animal_get" placeholder="Digite o id do animal"><br>
        <input type="submit" value="Enviar">
    </form>

    <h2>Deletar animal pelo id</h2>
    <form action="post" id="deletar_animal">
        <input type="text" id="id_animal_delet" placeholder="Digite o id do animal">
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
